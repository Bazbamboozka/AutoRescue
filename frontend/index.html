<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoRescue - Emergency Vehicle Breakdown Service</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', 'Poppins', system-ui; background: #f8f9fa; }
        
        @keyframes scaleIn { 
            from { opacity: 0; transform: scale(0.5) rotate(-10deg); } 
            to { opacity: 1; transform: scale(1) rotate(0deg); } 
        }
        @keyframes float { 
            0%, 100% { transform: translateY(0px); } 
            50% { transform: translateY(-20px); } 
        }
        @keyframes pulse-glow { 
            0%, 100% { box-shadow: 0 0 20px rgba(255, 107, 53, 0.3); } 
            50% { box-shadow: 0 0 40px rgba(255, 107, 53, 0.6); } 
        }
        @keyframes slide-up { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .splash-logo { animation: scaleIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .splash-text { animation: slide-up 1s ease-out 0.3s both; }
        .float-animation { animation: float 3s ease-in-out infinite; }
        .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
        .spinner { animation: spin 1s linear infinite; }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-8px); box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15); }
        .btn-primary { 
            background: linear-gradient(135deg, #FF6B35 0%, #FF8C42 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(255, 107, 53, 0.4); }
        .glass { 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
        }
        .gradient-text {
            background: linear-gradient(135deg, #FF6B35 0%, #F7B801 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body>
    <div id="root"></div>
 
    <script type="text/babel">
        const { useState, useEffect, useContext, createContext } = React;
        const API_URL = "http://127.0.0.1:5000/api";
 
        // Auth Context
        const AuthContext = createContext();
 
        async function fetchWithAuth(endpoint, options = {}) {
            const token = localStorage.getItem("token");
            const headers = {
                "Content-Type": "application/json",
                ...(options.headers || {})
            };
            if (token) {
                headers["Authorization"] = "Bearer " + token;
            }
            const res = await fetch(API_URL + endpoint, {
                ...options,
                headers
            });
            if (!res.ok) throw new Error(`API Error: ${res.status}`);
            return res.json();
        }
 
        function AuthProvider({ children }) {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
 
            useEffect(() => {
                const stored = localStorage.getItem("user");
                if (stored) setUser(JSON.parse(stored));
                setLoading(false);
            }, []);
 
            const login = async (email, password, role) => {
                try {
                    const res = await fetch(API_URL + "/auth/login", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    if (data.token) {
                        localStorage.setItem("token", data.token);
                        localStorage.setItem("user", JSON.stringify({ ...data.user, role }));
                        setUser({ ...data.user, role });
                        return true;
                    }
                    return false;
                } catch (err) {
                    console.error(err);
                    return false;
                }
            };
 
            const logout = () => {
                localStorage.clear();
                setUser(null);
            };
 
            return (
                <AuthContext.Provider value={{ user, login, logout, loading }}>
                    {children}
                </AuthContext.Provider>
            );
        }
 
        function useAuth() { return useContext(AuthContext); }
 
        // SPLASH SCREEN
        function SplashScreen({ onComplete }) {
            useEffect(() => {
                const timer = setTimeout(onComplete, 3500);
                return () => clearTimeout(timer);
            }, []);
 
            return (
                <div className="h-screen bg-gradient-to-br from-gray-900 via-gray-800 to-black flex items-center justify-center">
                    <div className="text-center">
                        <div className="splash-logo float-animation text-8xl mb-8">🚗</div>
                        <h1 className="splash-text text-6xl font-bold text-white mb-4">
                            <span className="gradient-text">AutoRescue</span>
                        </h1>
                        <p className="splash-text text-xl text-gray-400 mb-8">Emergency Breakdown Service</p>
                        <div className="splash-text flex justify-center gap-2">
                            <div className="w-3 h-3 bg-orange-500 rounded-full pulse-glow"></div>
                            <div className="w-3 h-3 bg-orange-500 rounded-full pulse-glow" style={{ animationDelay: '0.3s' }}></div>
                            <div className="w-3 h-3 bg-orange-500 rounded-full pulse-glow" style={{ animationDelay: '0.6s' }}></div>
                        </div>
                    </div>
                </div>
            );
        }
 
        // LOGIN PAGE
        function LoginPage() {
            const { login } = useAuth();
            const [selectedRole, setSelectedRole] = useState(null);
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [error, setError] = useState("");
            const [loading, setLoading] = useState(false);
 
            const roles = [
                { id: "customer", icon: "👤", title: "Customer", testEmail: "customer@test.com", testPassword: "pass" },
                { id: "provider", icon: "🔧", title: "Provider", testEmail: "provider@test.com", testPassword: "pass" },
                { id: "admin", icon: "👨‍💼", title: "Admin", testEmail: "admin@auto.com", testPassword: "admin123" }
            ];
 
            const handleLogin = async (e) => {
                e.preventDefault();
                if (!selectedRole) { setError("Select a role"); return; }
                setLoading(true);
                setError("");
                const success = await login(email, password, selectedRole);
                if (!success) setError("Invalid credentials");
                setLoading(false);
            };
 
            return (
                <div className="min-h-screen bg-gradient-to-br from-orange-50 via-white to-blue-50 flex items-center justify-center p-4">
                    <div className="w-full max-w-md">
                        <div className="text-center mb-12">
                            <div className="text-6xl mb-4">🚗</div>
                            <h1 className="text-4xl font-bold gradient-text mb-2">AutoRescue</h1>
                        </div>
 
                        <div className="grid grid-cols-3 gap-4 mb-8">
                            {roles.map(role => (
                                <button
                                    key={role.id}
                                    onClick={() => {
                                        setSelectedRole(role.id);
                                        setEmail(role.testEmail);
                                        setPassword(role.testPassword);
                                        setError("");
                                    }}
                                    className={`card-hover p-4 rounded-xl transition-all ${
                                        selectedRole === role.id
                                            ? 'glass bg-orange-50 border-2 border-orange-500'
                                            : 'glass'
                                    }`}
                                >
                                    <div className="text-3xl mb-2">{role.icon}</div>
                                    <p className="font-semibold text-sm">{role.title}</p>
                                </button>
                            ))}
                        </div>
 
                        <form onSubmit={handleLogin} className="glass p-8 rounded-2xl">
                            {error && <div className="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm">{error}</div>}
 
                            <div className="mb-4">
                                <input
                                    type="email"
                                    placeholder="Email"
                                    value={email}
                                    onChange={e => setEmail(e.target.value)}
                                    disabled={!selectedRole}
                                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:border-orange-500"
                                />
                            </div>
 
                            <div className="mb-6">
                                <input
                                    type="password"
                                    placeholder="Password"
                                    value={password}
                                    onChange={e => setPassword(e.target.value)}
                                    disabled={!selectedRole}
                                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:border-orange-500"
                                />
                            </div>
 
                            <button
                                type="submit"
                                disabled={!selectedRole || loading}
                                className="btn-primary w-full text-white font-semibold py-3 rounded-lg disabled:opacity-50"
                            >
                                {loading ? "Logging in..." : "Login →"}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }
 
        // CUSTOMER DASHBOARD
        function CustomerDashboard() {
            const { user, logout } = useAuth();
            const [requests, setRequests] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showForm, setShowForm] = useState(false);
            const [selectedRequest, setSelectedRequest] = useState(null);
            const [formData, setFormData] = useState({ issue_description: "", location_text: "" });
 
            useEffect(() => { loadRequests(); }, []);
 
            const loadRequests = async () => {
                try {
                    const data = await fetchWithAuth("/customer/requests");
                    setRequests(Array.isArray(data) ? data : []);
                } catch (err) {
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };
 
            const handleCreate = async (e) => {
                e.preventDefault();
                try {
                    await fetchWithAuth("/customer/requests", {
                        method: "POST",
                        body: JSON.stringify(formData)
                    });
                    setFormData({ issue_description: "", location_text: "" });
                    setShowForm(false);
                    loadRequests();
                } catch (err) {
                    console.error(err);
                }
            };
 
            return (
                <div className="min-h-screen bg-gray-50">
                    <div className="bg-white shadow-sm sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                            <div>
                                <h1 className="text-3xl font-bold gradient-text">AutoRescue</h1>
                                <p className="text-sm text-gray-600">Welcome, {user?.name}</p>
                            </div>
                            <button onClick={logout} className="px-6 py-2 bg-red-500 text-white rounded-lg">Logout</button>
                        </div>
                    </div>
 
                    <div className="max-w-7xl mx-auto px-6 py-8">
                        <div className="grid grid-cols-2 gap-6 mb-8">
                            <div className="card-hover glass p-6 rounded-2xl">
                                <div className="text-3xl mb-2">⚡</div>
                                <p className="text-gray-600 text-sm">Active Requests</p>
                                <p className="text-4xl font-bold text-orange-600">{requests.filter(r => r.status === "accepted").length}</p>
                            </div>
                            <div className="card-hover glass p-6 rounded-2xl">
                                <div className="text-3xl mb-2">✅</div>
                                <p className="text-gray-600 text-sm">Completed</p>
                                <p className="text-4xl font-bold text-green-600">{requests.filter(r => r.status === "completed").length}</p>
                            </div>
                        </div>
 
                        {!showForm ? (
                            <button onClick={() => setShowForm(true)} className="btn-primary w-full text-white font-bold py-4 rounded-xl mb-8">
                                + Create Breakdown Request
                            </button>
                        ) : (
                            <form onSubmit={handleCreate} className="glass p-8 rounded-2xl mb-8">
                                <h3 className="text-xl font-bold mb-4">Report a Breakdown</h3>
                                <input
                                    type="text"
                                    placeholder="Problem (e.g., Flat tire)"
                                    value={formData.issue_description}
                                    onChange={e => setFormData({ ...formData, issue_description: e.target.value })}
                                    className="w-full px-4 py-2 border rounded-lg mb-4"
                                    required
                                />
                                <input
                                    type="text"
                                    placeholder="Location"
                                    value={formData.location_text}
                                    onChange={e => setFormData({ ...formData, location_text: e.target.value })}
                                    className="w-full px-4 py-2 border rounded-lg mb-4"
                                    required
                                />
                                <div className="flex gap-3">
                                    <button type="submit" className="btn-primary text-white font-bold px-6 py-2 rounded-lg flex-1">Submit</button>
                                    <button type="button" onClick={() => setShowForm(false)} className="px-6 py-2 border rounded-lg">Cancel</button>
                                </div>
                            </form>
                        )}
 
                        <div>
                            <h2 className="text-2xl font-bold mb-6">Your Requests</h2>
                            {loading ? <p>Loading...</p> : requests.length === 0 ? (
                                <p className="text-gray-600">No requests yet</p>
                            ) : (
                                <div className="grid grid-cols-2 gap-6">
                                    {requests.map(req => (
                                        <div key={req.id} className="card-hover glass p-6 rounded-2xl">
                                            <div className="flex justify-between mb-3">
                                                <h3 className="font-bold">Request #{req.id}</h3>
                                                <span className="px-3 py-1 bg-orange-100 text-orange-700 rounded text-xs font-bold">{req.status}</span>
                                            </div>
                                            <p className="font-semibold mb-2">{req.issue_description}</p>
                                            <p className="text-gray-600 text-sm mb-4">📍 {req.location_text}</p>
                                            <button 
                                                onClick={() => setSelectedRequest(req)}
                                                className="btn-primary w-full text-white font-bold py-2 rounded-lg"
                                            >
                                                View Details
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
 
                    {/* Details Modal */}
                    {selectedRequest && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                            <div className="glass p-8 rounded-2xl max-w-md w-full">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-2xl font-bold">Request #{selectedRequest.id}</h3>
                                    <button 
                                        onClick={() => setSelectedRequest(null)}
                                        className="text-2xl font-bold text-gray-600"
                                    >
                                        ×
                                    </button>
                                </div>
                                <div className="space-y-4">
                                    <div>
                                        <p className="text-gray-600 text-sm">Problem</p>
                                        <p className="font-semibold text-lg">{selectedRequest.issue_description}</p>
                                    </div>
                                    <div>
                                        <p className="text-gray-600 text-sm">Location</p>
                                        <p className="font-semibold">📍 {selectedRequest.location_text}</p>
                                    </div>
                                    <div>
                                        <p className="text-gray-600 text-sm">Status</p>
                                        <p className={`font-semibold px-3 py-1 rounded text-center ${
                                            selectedRequest.status === 'pending' ? 'bg-yellow-100 text-yellow-700' :
                                            selectedRequest.status === 'accepted' ? 'bg-blue-100 text-blue-700' :
                                            'bg-green-100 text-green-700'
                                        }`}>
                                            {selectedRequest.status?.toUpperCase()}
                                        </p>
                                    </div>
                                </div>
                                <button 
                                    onClick={() => setSelectedRequest(null)}
                                    className="btn-primary w-full text-white font-bold py-2 rounded-lg mt-6"
                                >
                                    Close
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
 
        // PROVIDER DASHBOARD
        function ProviderDashboard() {
            const { user, logout } = useAuth();
            const [requests, setRequests] = useState([]);
            const [loading, setLoading] = useState(true);
 
            useEffect(() => { loadRequests(); }, []);
 
            const loadRequests = async () => {
                try {
                    const data = await fetchWithAuth("/provider/requests");
                    setRequests(Array.isArray(data) ? data : []);
                } catch (err) {
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };
 
            const handleAccept = async (id) => {
                try {
                    await fetchWithAuth(`/provider/accept/${id}`, { method: "POST" });
                    loadRequests();
                } catch (err) {
                    console.error(err);
                }
            };
 
            return (
                <div className="min-h-screen bg-gray-50">
                    <div className="bg-white shadow-sm sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                            <div>
                                <h1 className="text-3xl font-bold gradient-text">AutoRescue</h1>
                                <p className="text-sm text-gray-600">Provider • {user?.name}</p>
                            </div>
                            <button onClick={logout} className="px-6 py-2 bg-red-500 text-white rounded-lg">Logout</button>
                        </div>
                    </div>
 
                    <div className="max-w-7xl mx-auto px-6 py-8">
                        <div className="grid grid-cols-3 gap-6 mb-8">
                            <div className="card-hover glass p-6 rounded-2xl">
                                <div className="text-3xl mb-2">💰</div>
                                <p className="text-gray-600 text-sm">This Month</p>
                                <p className="text-4xl font-bold text-green-600">₹2,450</p>
                            </div>
                            <div className="card-hover glass p-6 rounded-2xl">
                                <div className="text-3xl mb-2">🏆</div>
                                <p className="text-gray-600 text-sm">Jobs Done</p>
                                <p className="text-4xl font-bold text-blue-600">18</p>
                            </div>
                            <div className="card-hover glass p-6 rounded-2xl">
                                <div className="text-3xl mb-2">⭐</div>
                                <p className="text-gray-600 text-sm">Rating</p>
                                <p className="text-4xl font-bold text-orange-600">4.9</p>
                            </div>
                        </div>
 
                        <h2 className="text-2xl font-bold mb-6">🔍 Available Jobs</h2>
                        {loading ? <p>Loading...</p> : requests.length === 0 ? (
                            <p className="text-gray-600">No pending requests</p>
                        ) : (
                            <div className="grid grid-cols-2 gap-6">
                                {requests.filter(r => r.status === "pending").map(req => (
                                    <div key={req.id} className="card-hover glass p-6 rounded-2xl border-l-4 border-orange-500">
                                        <div className="flex justify-between mb-3">
                                            <h3 className="font-bold">Request #{req.id}</h3>
                                            <span className="px-3 py-1 bg-yellow-100 text-yellow-700 rounded text-xs font-bold">NEW</span>
                                        </div>
                                        <p className="font-semibold mb-2">{req.issue_description}</p>
                                        <p className="text-gray-600 text-sm mb-4">📍 {req.location_text}</p>
                                        <button
                                            onClick={() => handleAccept(req.id)}
                                            className="btn-primary w-full text-white font-bold py-2 rounded-lg"
                                        >
                                            Accept Job ✓
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }
 
        // ADMIN DASHBOARD
        function AdminDashboard() {
            const { user, logout } = useAuth();
            const [users, setUsers] = useState([]);
            const [requests, setRequests] = useState([]);
            const [loading, setLoading] = useState(true);
 
            useEffect(() => { loadData(); }, []);
 
            const loadData = async () => {
                try {
                    const [usersData, reqData] = await Promise.all([
                        fetchWithAuth("/admin/users"),
                        fetchWithAuth("/admin/requests")
                    ]);
                    setUsers(Array.isArray(usersData) ? usersData : []);
                    setRequests(Array.isArray(reqData) ? reqData : []);
                } catch (err) {
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };
 
            return (
                <div className="min-h-screen bg-gray-50">
                    <div className="bg-white shadow-sm sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                            <div>
                                <h1 className="text-3xl font-bold gradient-text">AutoRescue Admin</h1>
                                <p className="text-sm text-gray-600">{user?.name}</p>
                            </div>
                            <button onClick={logout} className="px-6 py-2 bg-red-500 text-white rounded-lg">Logout</button>
                        </div>
                    </div>
 
                    <div className="max-w-7xl mx-auto px-6 py-8">
                        <div className="grid grid-cols-4 gap-6 mb-8">
                            <div className="card-hover glass p-6 rounded-2xl">
                                <div className="text-3xl mb-2">👥</div>
                                <p className="text-gray-600 text-sm">Users</p>
                                <p className="text-4xl font-bold text-blue-600">{users.length}</p>
                            </div>
                            <div className="card-hover glass p-6 rounded-2xl">
                                <div className="text-3xl mb-2">🔧</div>
                                <p className="text-gray-600 text-sm">Providers</p>
                                <p className="text-4xl font-bold text-green-600">{users.filter(u => u.role === "provider").length}</p>
                            </div>
                            <div className="card-hover glass p-6 rounded-2xl">
                                <div className="text-3xl mb-2">📋</div>
                                <p className="text-gray-600 text-sm">Requests</p>
                                <p className="text-4xl font-bold text-orange-600">{requests.length}</p>
                            </div>
                            <div className="card-hover glass p-6 rounded-2xl">
                                <div className="text-3xl mb-2">💳</div>
                                <p className="text-gray-600 text-sm">Revenue</p>
                                <p className="text-4xl font-bold text-purple-600">₹45K</p>
                            </div>
                        </div>
 
                        <div className="grid grid-cols-2 gap-8">
                            <div className="glass rounded-2xl p-6">
                                <h3 className="text-xl font-bold mb-4">Users</h3>
                                {loading ? <p>Loading...</p> : (
                                    <table className="w-full text-sm">
                                        <thead className="border-b">
                                            <tr>
                                                <th className="text-left py-2">Name</th>
                                                <th className="text-left py-2">Role</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {users.slice(0, 5).map(u => (
                                                <tr key={u.id} className="border-b">
                                                    <td className="py-3">{u.name}</td>
                                                    <td className="py-3 text-xs"><span className={`px-2 py-1 rounded ${u.role === 'provider' ? 'bg-green-100' : 'bg-blue-100'}`}>{u.role}</span></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                )}
                            </div>
 
                            <div className="glass rounded-2xl p-6">
                                <h3 className="text-xl font-bold mb-4">Requests</h3>
                                {loading ? <p>Loading...</p> : (
                                    <table className="w-full text-sm">
                                        <thead className="border-b">
                                            <tr>
                                                <th className="text-left py-2">ID</th>
                                                <th className="text-left py-2">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {requests.slice(0, 5).map(r => (
                                                <tr key={r.id} className="border-b">
                                                    <td className="py-3">#{r.id}</td>
                                                    <td className="py-3 text-xs"><span className="px-2 py-1 rounded bg-yellow-100">{r.status}</span></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
 
        // MAIN APP
        function App() {
            const { user } = useAuth();
            if (!user) return <LoginPage />;
            if (user.role === "admin") return <AdminDashboard />;
            if (user.role === "provider") return <ProviderDashboard />;
            return <CustomerDashboard />;
        }
 
        function Root() {
            const { loading } = useAuth();
            const [showSplash, setShowSplash] = useState(true);
 
            if (showSplash) return <SplashScreen onComplete={() => setShowSplash(false)} />;
            if (loading) return <div className="h-screen flex items-center justify-center">Loading...</div>;
 
            return (
                <AuthProvider>
                    <App />
                </AuthProvider>
            );
        }
 
        ReactDOM.createRoot(document.getElementById("root")).render(
            <AuthProvider>
                <Root />
            </AuthProvider>
        );
    </script>
</body>
</html>
