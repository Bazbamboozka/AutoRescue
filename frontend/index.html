<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoRescue - Premium Emergency Vehicle Service</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Chart.js for graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f9fafb;
        }

        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
        
        @keyframes driveAway {
            0% { transform: translateX(0); }
            100% { transform: translateX(120vw); }
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 107, 53, 0.3); }
            50% { box-shadow: 0 0 40px rgba(255, 107, 53, 0.6); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .animate-spin-slow {
            animation: spin 3s linear infinite;
        }

        .drive-away {
            animation: driveAway 1.5s ease-in forwards;
        }

        .float-animation {
            animation: float 3s ease-in-out infinite;
        }

        .pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useContext, createContext, useRef } = React;
        const API_BASE = "https://autorescue-api.onrender.com/api";
        // Icon component wrapper
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconMap = {
                'Car': 'car', 'Wrench': 'wrench', 'User': 'user', 'ShieldCheck': 'shield-check',
                'LogOut': 'log-out', 'Plus': 'plus', 'MapPin': 'map-pin', 'Clock': 'clock',
                'CheckCircle': 'check-circle', 'AlertCircle': 'alert-circle', 'Star': 'star',
                'DollarSign': 'dollar-sign', 'X': 'x', 'Menu': 'menu', 'ChevronRight': 'chevron-right',
                'Activity': 'activity', 'Users': 'users', 'LayoutDashboard': 'layout-dashboard',
                'Trash2': 'trash-2', 'ThumbsUp': 'thumbs-up', 'ThumbsDown': 'thumbs-down',
                'Phone': 'phone', 'Mail': 'mail', 'IndianRupee': 'banknote'
            };

            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {name === 'Car' && <><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></>}
                    {name === 'Wrench' && <><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></>}
                    {name === 'User' && <><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>}
                    {name === 'ShieldCheck' && <><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></>}
                    {name === 'LogOut' && <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>}
                    {name === 'Plus' && <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>}
                    {name === 'MapPin' && <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></>}
                    {name === 'Clock' && <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>}
                    {name === 'CheckCircle' && <><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>}
                    {name === 'AlertCircle' && <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>}
                    {name === 'Star' && <><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></>}
                    {name === 'DollarSign' && <><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>}
                    {name === 'X' && <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>}
                    {name === 'Menu' && <><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="18" x2="20" y2="18"/></>}
                    {name === 'ChevronRight' && <><polyline points="9 18 15 12 9 6"/></>}
                    {name === 'Activity' && <><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></>}
                    {name === 'Users' && <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>}
                    {name === 'LayoutDashboard' && <><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></>}
                    {name === 'Trash2' && <><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>}
                    {name === 'Phone' && <><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></>}
                    {name === 'Mail' && <><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></>}
                    {name === 'IndianRupee' && <><path d="M6 3h12"/><path d="M6 8h12"/><path d="M6 13l6 6"/><path d="m18 13-6 6"/><path d="M12 13V3"/></>}
                </svg>
            );
        };

        // --- MOCK API & CONTEXT ---
        const AuthContext = createContext();

        function AuthProvider({ children }) {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const stored = localStorage.getItem("user");
                if (stored) setUser(JSON.parse(stored));
                setLoading(false);
            }, []);

            const login = async (email, password, role) => {
    const res = await fetch(`${API_BASE}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email, password: password })
    });
    const data = await res.json();
    if (res.ok) {
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));
        setUser(data.user);
        return { success: true };
    } else {
        alert(data.message);
        return { success: false };
    }
};

            const register = async (name, email, password, role) => {
    const res = await fetch(`${API_BASE}/auth/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: name, email: email, password: password, role: role })
    });
    const data = await res.json();
    if (res.ok) {
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));
        setUser(data.user);
        return { success: true };
    } else {
        alert(data.message);
        return { success: false };
    }
};

            const logout = () => {
                localStorage.clear();
                setUser(null);
            };

            return (
                <AuthContext.Provider value={{ user, login, register, logout, loading }}>
                    {children}
                </AuthContext.Provider>
            );
        }

        function useAuth() { return useContext(AuthContext); }

        // --- 1. ANIMATED SPLASH SCREEN ---
        function SplashScreen({ onComplete }) {
            const [progress, setProgress] = useState(0);
            const [isDrivingAway, setIsDrivingAway] = useState(false);

            useEffect(() => {
                let interval = setInterval(() => {
                    setProgress((prev) => {
                        if (prev >= 100) {
                            clearInterval(interval);
                            setTimeout(() => setIsDrivingAway(true), 500);
                            setTimeout(onComplete, 2000);
                            return 100;
                        }
                        return prev + 2;
                    });
                }, 30);
                return () => clearInterval(interval);
            }, [onComplete]);

            return (
                <div className="h-screen w-full bg-slate-900 flex flex-col items-center justify-center relative overflow-hidden">
                    <div className="absolute top-10 left-10 w-32 h-32 border-4 border-slate-700 rounded-full opacity-20 animate-pulse"></div>
                    <div className="absolute bottom-20 right-20 w-48 h-48 border-4 border-slate-700 rotate-45 opacity-20"></div>
                    <div className="absolute top-1/2 left-20 w-4 h-4 bg-orange-500 rounded-full opacity-50"></div>
                    <div className="absolute bottom-1/3 right-1/3 w-8 h-8 border-2 border-orange-500 rounded-full opacity-30"></div>
                    <div className="absolute bottom-1/3 w-full h-1 bg-slate-800"></div>

                    <div className={`z-10 mb-12 transition-transform duration-1000 ease-in ${isDrivingAway ? 'translate-x-[120vw]' : 'translate-x-0'}`}>
                        <div className="relative">
                            <Icon name="Car" size={80} className="text-orange-500 drop-shadow-[0_0_15px_rgba(249,115,22,0.6)]" />
                            <div className="absolute bottom-1 left-2 w-3 h-3 bg-slate-900 rounded-full animate-spin border-2 border-gray-600"></div>
                            <div className="absolute bottom-1 right-2 w-3 h-3 bg-slate-900 rounded-full animate-spin border-2 border-gray-600"></div>
                        </div>
                    </div>

                    <h1 className="text-5xl font-bold text-white mb-2 tracking-wider z-10">
                        Auto<span className="text-orange-500">Rescue</span>
                    </h1>
                    <p className="text-slate-400 mb-8 z-10">Premium Emergency Vehicle Service</p>

                    <div className="w-64 h-2 bg-slate-800 rounded-full overflow-hidden z-10 relative">
                        <div className="h-full bg-gradient-to-r from-orange-500 to-yellow-500 transition-all duration-100 ease-linear" style={{ width: `${progress}%` }}></div>
                    </div>
                    <p className="mt-2 text-slate-500 text-xs z-10">{progress}%</p>
                </div>
            );
        }

        // --- 2. REDESIGNED LOGIN SCREEN WITH REGISTER ---
        function LoginSignupPage() {
            const { login, register } = useAuth();
            const [isLogin, setIsLogin] = useState(true);
            const [selectedRole, setSelectedRole] = useState('customer');
            const [isLoading, setIsLoading] = useState(false);
            const [formData, setFormData] = useState({
                name: '',
                email: '',
                password: '',
                confirmPassword: ''
            });

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                
                if (!isLogin) {
                    if (formData.password !== formData.confirmPassword) {
                        alert("Passwords don't match!");
                        setIsLoading(false);
                        return;
                    }
                    if (formData.password.length < 6) {
                        alert("Password must be at least 6 characters!");
                        setIsLoading(false);
                        return;
                    }
                    await register(formData.name, formData.email, formData.password, selectedRole);
                } else {
                    await login(formData.email, formData.password, selectedRole);
                }
                setIsLoading(false);
            };

            const roles = [
                { id: "customer", icon: "User", title: "Customer" },
                { id: "provider", icon: "Wrench", title: "Provider" },
                { id: "admin", icon: "ShieldCheck", title: "Admin" }
            ];

            return (
                <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4 relative overflow-hidden">
                    <div className="absolute top-10 left-10 text-blue-100 transform -rotate-12"><Icon name="Car" size={120} /></div>
                    <div className="absolute bottom-10 right-10 text-orange-100 transform rotate-12"><Icon name="Wrench" size={100} /></div>
                    <div className="absolute top-1/4 right-1/4 w-32 h-32 bg-purple-100 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-pulse"></div>
                    <div className="absolute bottom-1/4 left-1/4 w-32 h-32 bg-blue-100 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-pulse" style={{animationDelay: '2s'}}></div>
                    
                    <div className="absolute top-20 right-20 bg-white p-3 rounded-xl shadow-lg flex items-center gap-2 animate-bounce" style={{animationDuration: '3s'}}>
                        <div className="w-2 h-2 bg-green-500 rounded-full"></div>
                        <span className="text-xs font-bold text-gray-600">24/7 Support</span>
                    </div>
                    <div className="absolute bottom-32 left-20 bg-white p-3 rounded-xl shadow-lg flex items-center gap-2 animate-bounce" style={{animationDuration: '4s'}}>
                        <Icon name="Star" size={16} className="text-yellow-400" />
                        <span className="text-xs font-bold text-gray-600">Top Rated</span>
                    </div>

                    <div className="w-full max-w-md relative z-10">
                        <div className="bg-white/80 backdrop-blur-md rounded-3xl shadow-2xl p-8 border border-white">
                            <div className="text-center mb-8">
                                <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-orange-100 text-orange-600 mb-4 shadow-inner">
                                    <Icon name="Car" size={32} />
                                </div>
                                <h1 className="text-3xl font-bold text-gray-800">Welcome Back</h1>
                                <p className="text-gray-500 text-sm mt-2">Select your role to continue</p>
                            </div>

                            <div className="grid grid-cols-3 gap-2 mb-6 bg-gray-100 p-1 rounded-xl">
                                {roles.map(role => (
                                    <button
                                        key={role.id}
                                        onClick={() => setSelectedRole(role.id)}
                                        className={`flex flex-col items-center justify-center py-3 rounded-lg transition-all duration-200 ${
                                            selectedRole === role.id 
                                                ? 'bg-white shadow-md text-orange-600 ring-1 ring-black/5' 
                                                : 'text-gray-400 hover:text-gray-600'
                                        }`}
                                    >
                                        <Icon name={role.icon} size={24} />
                                        <span className="text-xs font-semibold mt-1">{role.title}</span>
                                    </button>
                                ))}
                            </div>

                            <div className="flex bg-gray-100 p-1 rounded-xl mb-6">
                                <button
                                    onClick={() => setIsLogin(true)}
                                    className={`flex-1 py-2 rounded-lg text-sm font-bold transition-all ${isLogin ? 'bg-white shadow-md text-slate-900' : 'text-gray-500'}`}
                                >
                                    Sign In
                                </button>
                                <button
                                    onClick={() => setIsLogin(false)}
                                    className={`flex-1 py-2 rounded-lg text-sm font-bold transition-all ${!isLogin ? 'bg-white shadow-md text-slate-900' : 'text-gray-500'}`}
                                >
                                    Register
                                </button>
                            </div>

                            <form onSubmit={handleSubmit} className="space-y-4">
                                {!isLogin && (
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Full Name</label>
                                        <input 
                                            type="text" 
                                            required 
                                            value={formData.name}
                                            onChange={(e) => setFormData({...formData, name: e.target.value})}
                                            className="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:border-orange-500 focus:bg-white focus:ring-0 transition-colors outline-none" 
                                            placeholder="John Doe" 
                                        />
                                    </div>
                                )}
                                
                                <div>
                                    <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Email</label>
                                    <input 
                                        type="email" 
                                        required 
                                        value={formData.email}
                                        onChange={(e) => setFormData({...formData, email: e.target.value})}
                                        className="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:border-orange-500 focus:bg-white focus:ring-0 transition-colors outline-none" 
                                        placeholder="name@example.com" 
                                    />
                                </div>
                                
                                <div>
                                    <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Password</label>
                                    <input 
                                        type="password" 
                                        required 
                                        value={formData.password}
                                        onChange={(e) => setFormData({...formData, password: e.target.value})}
                                        className="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:border-orange-500 focus:bg-white focus:ring-0 transition-colors outline-none" 
                                        placeholder="••••••••" 
                                    />
                                </div>

                                {!isLogin && (
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Confirm Password</label>
                                        <input 
                                            type="password" 
                                            required 
                                            value={formData.confirmPassword}
                                            onChange={(e) => setFormData({...formData, confirmPassword: e.target.value})}
                                            className="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:border-orange-500 focus:bg-white focus:ring-0 transition-colors outline-none" 
                                            placeholder="••••••••" 
                                        />
                                    </div>
                                )}
                                
                                <button
                                    type="submit"
                                    disabled={isLoading}
                                    className="w-full bg-slate-900 text-white font-bold py-3 rounded-lg hover:bg-slate-800 transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-lg flex items-center justify-center gap-2"
                                >
                                    {isLoading ? (
                                        <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                                    ) : (
                                        <>{isLogin ? 'Sign In' : 'Create Account'} <Icon name="ChevronRight" size={18} /></>
                                    )}
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        // --- SHARED DASHBOARD LAYOUT ---
        const DashboardLayout = ({ children, user, activeTab, setActiveTab, tabs }) => {
            const { logout } = useAuth();
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);

            return (
                <div className="min-h-screen bg-gray-50 flex text-slate-800">
                    <aside className={`bg-slate-900 text-white transition-all duration-300 flex flex-col ${isSidebarOpen ? 'w-64' : 'w-20'}`}>
                        <div className="h-16 flex items-center justify-center border-b border-slate-800">
                            <div className="flex items-center gap-2 font-bold text-xl">
                                <Icon name="Car" size={28} className="text-orange-500" />
                                {isSidebarOpen && <span>Auto<span className="text-orange-500">Rescue</span></span>}
                            </div>
                        </div>

                        <nav className="flex-1 py-6 px-3 space-y-2">
                            {tabs.map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg transition-colors ${
                                        activeTab === tab.id 
                                            ? 'bg-orange-500 text-white shadow-lg' 
                                            : 'text-slate-400 hover:bg-slate-800 hover:text-white'
                                    }`}
                                >
                                    <Icon name={tab.icon} size={20} />
                                    {isSidebarOpen && <span className="font-medium">{tab.label}</span>}
                                </button>
                            ))}
                        </nav>

                        <div className="p-4 border-t border-slate-800">
                            <button 
                                onClick={logout}
                                className="w-full flex items-center gap-3 px-3 py-3 rounded-lg text-slate-400 hover:bg-red-500/10 hover:text-red-500 transition-colors"
                            >
                                <Icon name="LogOut" size={20} />
                                {isSidebarOpen && <span>Logout</span>}
                            </button>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-screen overflow-hidden">
                        <header className="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8">
                            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 hover:bg-gray-100 rounded-lg text-gray-500">
                                <Icon name="Menu" size={20} />
                            </button>
                            <div className="flex items-center gap-4">
                                <div className="text-right hidden sm:block">
                                    <p className="text-sm font-bold text-gray-800">{user?.name}</p>
                                    <p className="text-xs text-gray-500 capitalize">{user?.role}</p>
                                </div>
                                <div className="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center text-orange-600 font-bold">
                                    {user?.name?.charAt(0)}
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-8">
                            {children}
                        </div>
                    </main>
                </div>
            );
        };

        // --- CUSTOMER DASHBOARD ---
        function CustomerDashboard() {
            const { user } = useAuth();
            const [activeTab, setActiveTab] = useState('dashboard');
            const [requests, setRequests] = useState([]);
            const [showReviewModal, setShowReviewModal] = useState(null);
            const [showNewRequestModal, setShowNewRequestModal] = useState(false);
            const [showSupportModal, setShowSupportModal] = useState(false);

            const issueTypes = [
                "Flat Tire",
                "Engine Failure",
                "Battery Dead",
                "Brake Failure",
                "Transmission Issue",
                "Overheating",
                "Starter Motor Failure",
                "Fuel Pump Failure",
                "Alternator Failure",
                "Radiator Leak",
                "Other"
            ];

            const [newRequest, setNewRequest] = useState({

                    });
                }
            }, [activeTab]);

            const handleRemoveUser = (id) => {
                if(confirm("Are you sure you want to remove this user?")) {
                    setUsers(users.filter(u => u.id !== id));
                }
            };

            const totalEarnings = requests.reduce((acc, r) => acc + r.price, 0);

            const tabs = [
                { id: 'users', label: 'User Management', icon: 'Users' },
                { id: 'analytics', label: 'Platform Analytics', icon: 'Activity' },
            ];

            return (
                <DashboardLayout user={user} activeTab={activeTab} setActiveTab={setActiveTab} tabs={tabs}>
                    {activeTab === 'users' && (
                        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                            <div className="p-6 border-b border-gray-100 flex justify-between items-center">
                                <h2 className="text-xl font-bold text-gray-800">Registered Users</h2>
                            </div>
                            <table className="w-full text-left">
                                <thead className="bg-gray-50">
                                    <tr>
                                        <th className="p-4 text-xs font-bold text-gray-500 uppercase">User</th>
                                        <th className="p-4 text-xs font-bold text-gray-500 uppercase">Role</th>
                                        <th className="p-4 text-xs font-bold text-gray-500 uppercase">Status</th>
                                        <th className="p-4 text-xs font-bold text-gray-500 uppercase text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {users.map(u => (
                                        <tr key={u.id} className="border-b border-gray-50 hover:bg-gray-50">
                                            <td className="p-4">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center font-bold text-xs text-gray-600">
                                                        {u.name.charAt(0)}
                                                    </div>
                                                    <span className="font-bold text-gray-800">{u.name}</span>
                                                </div>
                                            </td>
                                            <td className="p-4">
                                                <span className={`text-xs font-bold px-2 py-1 rounded ${
                                                    u.role === 'admin' ? 'bg-purple-100 text-purple-700' :
                                                    u.role === 'provider' ? 'bg-blue-100 text-blue-700' :
                                                    'bg-gray-100 text-gray-700'
                                                }`}>
                                                    {u.role.toUpperCase()}
                                                </span>
                                            </td>
                                            <td className="p-4">
                                                <span className={`text-xs font-bold px-2 py-1 rounded ${
                                                    u.status === 'Active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'
                                                }`}>
                                                    {u.status}
                                                </span>
                                            </td>
                                            <td className="p-4 text-right">
                                                <button onClick={() => handleRemoveUser(u.id)} className="text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors" title="Remove User">
                                                    <Icon name="Trash2" size={18} />
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}
                    {activeTab === 'analytics' && (
                        <div className="space-y-6">
                            {/* Total Earnings Card */}
                            <div className="bg-gradient-to-r from-orange-500 to-orange-600 text-white p-8 rounded-2xl shadow-lg">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-orange-100 text-sm font-bold uppercase">Total Platform Earnings</p>
                                        <p className="text-5xl font-bold mt-2">₹{totalEarnings.toLocaleString()}</p>
                                    </div>
                                    <div className="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center">
                                        <Icon name="IndianRupee" size={32} />
                                    </div>
                                </div>
                                <div className="mt-4 flex items-center gap-2">
                                    <span className="bg-white/20 px-3 py-1 rounded-full text-sm">↑ 24% from last month</span>
                                </div>
                            </div>

                            {/* Charts Grid */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                    <h3 className="font-bold text-gray-800 mb-4">Failure Types Distribution</h3>
                                    <canvas ref={pieChartRef} className="w-full h-64"></canvas>
                                </div>
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                    <h3 className="font-bold text-gray-800 mb-4">Monthly Growth</h3>
                                    <canvas ref={barChartRef} className="w-full h-64"></canvas>
                                </div>
                            </div>

                            {/* System Health */}
                            <div className="bg-slate-900 text-white p-6 rounded-2xl">
                                <h3 className="font-bold mb-2">System Health</h3>
                                <div className="flex items-center gap-2 mb-4">
                                    <div className="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                                    <span className="text-sm text-slate-300">All Systems Operational</span>
                                </div>
                                <div className="grid grid-cols-2 gap-4 mt-4">
                                    <div className="bg-slate-800 p-3 rounded-lg">
                                        <p className="text-xs text-slate-400">Server Load</p>
                                        <p className="font-bold text-lg">24%</p>
                                    </div>
                                    <div className="bg-slate-800 p-3 rounded-lg">
                                        <p className="text-xs text-slate-400">Uptime</p>
                                        <p className="font-bold text-lg">99.9%</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </DashboardLayout>
            );
        }

        // --- MAIN APP ROUTER ---
        function App() {
            const { user } = useAuth();
            if (!user) return <LoginSignupPage />;
            if (user.role === "admin") return <AdminDashboard />;
            if (user.role === "provider") return <ProviderDashboard />;
            return <CustomerDashboard />;
        }

        // --- ROOT COMPONENT ---
        function Root() {
            const [showSplash, setShowSplash] = useState(() => {
                const hasSeenSplash = sessionStorage.getItem("hasSeenSplash");
                return !hasSeenSplash;
            });

            const handleSplashComplete = () => {
                sessionStorage.setItem("hasSeenSplash", "true");
                setShowSplash(false);
            };

            return (
                <AuthProvider>
                    {showSplash ? <SplashScreen onComplete={handleSplashComplete} /> : <App />}
                </AuthProvider>
            );
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Root />);
    </script>
</body>
</html>
