<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoRescue - Premium Emergency Vehicle Service</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }

        @keyframes scaleIn { 
            from { opacity: 0; transform: scale(0.5) rotate(-10deg); } 
            to { opacity: 1; transform: scale(1) rotate(0deg); } 
        }
        @keyframes float { 
            0%, 100% { transform: translateY(0px); } 
            50% { transform: translateY(-20px); } 
        }
        @keyframes pulse-glow { 
            0%, 100% { box-shadow: 0 0 20px rgba(255, 107, 53, 0.3); } 
            50% { box-shadow: 0 0 40px rgba(255, 107, 53, 0.6); } 
        }
        @keyframes slide-up { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { 
            from { opacity: 0; transform: translateX(-30px); } 
            to { opacity: 1; transform: translateX(0); } 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .splash-logo { animation: scaleIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .splash-text { animation: slide-up 1s ease-out 0.3s both; }
        .float-animation { animation: float 3s ease-in-out infinite; }
        .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
        .spinner { animation: spin 1s linear infinite; }
        .slide-in { animation: slideIn 0.5s ease-out; }
        .fade-in { animation: fadeIn 0.6s ease-out; }

        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.95);
        }
        .card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            background: rgba(255, 255, 255, 1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #FF6B35 0%, #FF8C42 100%);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(255, 107, 53, 0.4);
            background: linear-gradient(135deg, #FF8C42 0%, #FF6B35 100%);
        }
        .btn-primary:active { transform: translateY(0); }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
        }

        .gradient-text {
            background: linear-gradient(135deg, #FF6B35 0%, #F7B801 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .gradient-bg {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient-shift 15s ease infinite;
        }

        .input-focus {
            transition: all 0.2s ease;
        }
        .input-focus:focus {
            outline: none;
            border-color: #FF6B35;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        .badge-pending { background: #FEF08A; color: #92400e; }
        .badge-accepted { background: #DBEAFE; color: #1e40af; }
        .badge-in-progress { background: #FBCFE8; color: #831843; }
        .badge-completed { background: #DCFCE7; color: #166534; }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            animation: fadeIn 0.3s ease-out;
        }

        .modal-content {
            animation: slide-up 0.4s ease-out;
        }
    </style>
</head>
<body class="gradient-bg">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useContext, createContext } = React;
        const API_URL = "https://autorescue-api.onrender.com/api";

        // ============ SPLASH SCREEN ============
        function SplashScreen({ onComplete }) {
            useEffect(() => {
                const timer = setTimeout(onComplete, 3500);
                return () => clearTimeout(timer);
            }, []);

            return (
                <div className="h-screen bg-gradient-to-br from-gray-900 via-gray-800 to-black flex items-center justify-center relative overflow-hidden">
                    <div className="absolute top-20 left-20 w-72 h-72 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
                    <div className="absolute top-40 right-20 w-72 h-72 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse" style={{animationDelay: '2s'}}></div>
                    <div className="absolute bottom-20 left-1/2 w-72 h-72 bg-pink-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse" style={{animationDelay: '4s'}}></div>

                    <div className="text-center relative z-10">
                        <div className="splash-logo float-animation text-8xl mb-8">🚗</div>
                        <h1 className="splash-text text-6xl font-bold text-white mb-4">
                            <span className="gradient-text">AutoRescue</span>
                        </h1>
                        <p className="splash-text text-xl text-gray-300 mb-12">Premium Emergency Breakdown Service</p>
                        
                        <div className="splash-text flex justify-center gap-3 mb-8">
                            <div className="w-3 h-3 bg-orange-500 rounded-full pulse-glow"></div>
                            <div className="w-3 h-3 bg-orange-500 rounded-full pulse-glow" style={{ animationDelay: '0.3s' }}></div>
                            <div className="w-3 h-3 bg-orange-500 rounded-full pulse-glow" style={{ animationDelay: '0.6s' }}></div>
                        </div>

                        <p className="splash-text text-sm text-gray-400">Connecting you with trusted service providers...</p>
                    </div>
                </div>
            );
        }

        // ============ AUTH CONTEXT ============
        const AuthContext = createContext();

        async function fetchWithAuth(endpoint, options = {}) {
            const token = localStorage.getItem("token");
            const headers = {
                "Content-Type": "application/json",
                ...(options.headers || {})
            };
            if (token) {
                headers["Authorization"] = "Bearer " + token;
            }
            const res = await fetch(API_URL + endpoint, {
                ...options,
                headers
            });
            if (!res.ok) throw new Error(`API Error: ${res.status}`);
            return res.json();
        }

        function AuthProvider({ children }) {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const stored = localStorage.getItem("user");
                if (stored) setUser(JSON.parse(stored));
                setLoading(false);
            }, []);

            const register = async (name, email, password, role) => {
                try {
                    const res = await fetch(API_URL + "/auth/register", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ name, email, password, role })
                    });
                    const data = await res.json();
                    if (data.token) {
                        localStorage.setItem("token", data.token);
                        localStorage.setItem("user", JSON.stringify({ ...data.user, role }));
                        setUser({ ...data.user, role });
                        return { success: true, message: "Registration successful!" };
                    }
                    return { success: false, message: "Registration failed" };
                } catch (err) {
                    return { success: false, message: err.message };
                }
            };

            const login = async (email, password, role) => {
                try {
                    const res = await fetch(API_URL + "/auth/login", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    if (data.token) {
                        localStorage.setItem("token", data.token);
                        localStorage.setItem("user", JSON.stringify({ ...data.user, role }));
                        setUser({ ...data.user, role });
                        return { success: true, message: "Login successful!" };
                    }
                    return { success: false, message: data.message || "Invalid credentials" };
                } catch (err) {
                    return { success: false, message: err.message };
                }
            };

            const logout = () => {
                localStorage.clear();
                setUser(null);
            };

            return (
                <AuthContext.Provider value={{ user, login, register, logout, loading }}>
                    {children}
                </AuthContext.Provider>
            );
        }

        function useAuth() { return useContext(AuthContext); }

        // ============ LOGIN & SIGNUP PAGE ============
        function LoginSignupPage() {
            const { login, register } = useAuth();
            const [isSignup, setIsSignup] = useState(false);
            const [selectedRole, setSelectedRole] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");
            const [success, setSuccess] = useState("");
            
            const [formData, setFormData] = useState({
                name: "",
                email: "",
                password: "",
                confirmPassword: ""
            });

            const roles = [
                { id: "customer", icon: "👤", title: "Customer", desc: "Book services", color: "from-blue-400 to-blue-600" },
                { id: "provider", icon: "🔧", title: "Provider", desc: "Offer services", color: "from-red-400 to-red-600" },
                { id: "admin", icon: "👨‍💼", title: "Admin", desc: "Manage platform", color: "from-green-400 to-green-600" }
            ];

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!selectedRole) {
                    setError("Please select a role");
                    return;
                }

                if (isSignup) {
                    if (formData.password !== formData.confirmPassword) {
                        setError("Passwords don't match");
                        return;
                    }
                    if (formData.password.length < 6) {
                        setError("Password must be at least 6 characters");
                        return;
                    }
                }

                setLoading(true);
                setError("");
                setSuccess("");

                const result = isSignup
                    ? await register(formData.name, formData.email, formData.password, selectedRole)
                    : await login(formData.email, formData.password, selectedRole);

                if (result.success) {
                    setSuccess(result.message);
                    // No reload needed - React handles state update automatically
                } else {
                    setError(result.message);
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-purple-500 via-pink-500 to-orange-400 flex items-center justify-center p-4 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-96 h-96 bg-white rounded-full mix-blend-multiply filter blur-3xl opacity-10"></div>
                    <div className="absolute bottom-0 right-0 w-96 h-96 bg-white rounded-full mix-blend-multiply filter blur-3xl opacity-10"></div>

                    <div className="w-full max-w-md relative z-10 slide-in">
                        <div className="text-center mb-8">
                            <div className="text-7xl mb-3 float-animation">🚗</div>
                            <h1 className="text-4xl font-bold gradient-text mb-2">AutoRescue</h1>
                            <p className="text-white text-sm">Emergency Breakdown Service</p>
                        </div>

                        <div className="grid grid-cols-3 gap-3 mb-8">
                            {roles.map(role => (
                                <button
                                    key={role.id}
                                    onClick={() => {
                                        setSelectedRole(role.id);
                                        setError("");
                                        setFormData({ name: "", email: "", password: "", confirmPassword: "" });
                                    }}
                                    className={`p-4 rounded-xl transition-all ${
                                        selectedRole === role.id
                                            ? `bg-gradient-to-br ${role.color} text-white shadow-lg transform scale-105`
                                            : 'glass text-gray-800 hover:shadow-lg'
                                    }`}
                                >
                                    <div className="text-3xl mb-2">{role.icon}</div>
                                    <p className="font-bold text-sm">{role.title}</p>
                                    <p className="text-xs opacity-75 mt-1">{role.desc}</p>
                                </button>
                            ))}
                        </div>

                        <div className="text-center mb-6">
                            <p className="text-white text-sm">
                                {isSignup ? "Already have an account? " : "New user? "}
                                <button
                                    onClick={() => {
                                        setIsSignup(!isSignup);
                                        setError("");
                                        setSuccess("");
                                        setFormData({ name: "", email: "", password: "", confirmPassword: "" });
                                    }}
                                    className="font-bold text-white underline hover:text-gray-200 transition"
                                >
                                    {isSignup ? "Login" : "Sign Up"}
                                </button>
                            </p>
                        </div>

                        <form onSubmit={handleSubmit} className="glass p-8 rounded-2xl">
                            {error && (
                                <div className="mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm animate-pulse">
                                    ⚠️ {error}
                                </div>
                            )}
                            {success && (
                                <div className="mb-4 p-3 bg-green-100 border border-green-400 text-green-700 rounded-lg text-sm">
                                    ✅ {success}
                                </div>
                            )}

                            {isSignup && (
                                <div className="mb-4">
                                    <label className="block text-gray-700 font-semibold mb-2 text-sm">Full Name</label>
                                    <input
                                        type="text"
                                        placeholder="John Doe"
                                        value={formData.name}
                                        onChange={e => setFormData({ ...formData, name: e.target.value })}
                                        className="input-focus w-full px-4 py-3 border border-gray-300 rounded-lg text-sm"
                                        required={isSignup}
                                    />
                                </div>
                            )}

                            <div className="mb-4">
                                <label className="block text-gray-700 font-semibold mb-2 text-sm">Email Address</label>
                                <input
                                    type="email"
                                    placeholder="you@example.com"
                                    value={formData.email}
                                    onChange={e => setFormData({ ...formData, email: e.target.value })}
                                    className="input-focus w-full px-4 py-3 border border-gray-300 rounded-lg text-sm"
                                    required
                                />
                            </div>

                            <div className="mb-4">
                                <label className="block text-gray-700 font-semibold mb-2 text-sm">Password</label>
                                <input
                                    type="password"
                                    placeholder="••••••••"
                                    value={formData.password}
                                    onChange={e => setFormData({ ...formData, password: e.target.value })}
                                    className="input-focus w-full px-4 py-3 border border-gray-300 rounded-lg text-sm"
                                    required
                                />
                            </div>

                            {isSignup && (
                                <div className="mb-6">
                                    <label className="block text-gray-700 font-semibold mb-2 text-sm">Confirm Password</label>
                                    <input
                                        type="password"
                                        placeholder="••••••••"
                                        value={formData.confirmPassword}
                                        onChange={e => setFormData({ ...formData, confirmPassword: e.target.value })}
                                        className="input-focus w-full px-4 py-3 border border-gray-300 rounded-lg text-sm"
                                        required={isSignup}
                                    />
                                </div>
                            )}

                            <button
                                type="submit"
                                disabled={!selectedRole || loading}
                                className="btn-primary w-full text-white font-bold py-3 rounded-lg disabled:opacity-50 flex items-center justify-center gap-2 text-sm"
                            >
                                {loading ? (
                                    <>
                                        <div className="spinner w-4 h-4 border-2 border-white border-t-transparent rounded-full"></div>
                                        {isSignup ? "Creating account..." : "Logging in..."}
                                    </>
                                ) : (
                                    isSignup ? "Create Account →" : "Login →"
                                )}
                            </button>

                            <p className="text-center text-gray-600 text-xs mt-4">
                                💡 Select a role to get started
                            </p>
                        </form>
                    </div>
                </div>
            );
        }

        // ============ CUSTOMER DASHBOARD ============
        function CustomerDashboard() {
            const { user, logout } = useAuth();
            const [requests, setRequests] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showCreateForm, setShowCreateForm] = useState(false);
            const [selectedRequest, setSelectedRequest] = useState(null);
            const [formData, setFormData] = useState({ issue_description: "", location_text: "" });
            const [submitting, setSubmitting] = useState(false);

            useEffect(() => { loadRequests(); }, []);

            const loadRequests = async () => {
                try {
                    setLoading(true);
                    const data = await fetchWithAuth("/customer/requests");
                    setRequests(Array.isArray(data) ? data : []);
                } catch (err) {
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            const handleCreateRequest = async (e) => {
                e.preventDefault();
                if (!formData.issue_description || !formData.location_text) {
                    alert("Please fill all fields");
                    return;
                }

                setSubmitting(true);
                try {
                    await fetchWithAuth("/customer/requests", {
                        method: "POST",
                        body: JSON.stringify(formData)
                    });
                    
                    setFormData({ issue_description: "", location_text: "" });
                    setShowCreateForm(false);
                    
                    const data = await fetchWithAuth("/customer/requests");
                    setRequests(Array.isArray(data) ? data : []);
                } catch (err) {
                    alert("Failed to create request");
                } finally {
                    setSubmitting(false);
                }
            };

            const stats = {
                active: requests.filter(r => r.status === "accepted" || r.status === "in_progress").length,
                completed: requests.filter(r => r.status === "completed").length
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 via-blue-100 to-indigo-200">
                    <div className="sticky top-0 z-50 bg-white shadow-lg">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="text-4xl">🚗</div>
                                <div>
                                    <h1 className="text-2xl font-bold gradient-text">AutoRescue</h1>
                                    <p className="text-xs text-gray-600">Welcome, {user?.name}</p>
                                </div>
                            </div>
                            <button 
                                onClick={logout}
                                className="px-6 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg font-semibold transition transform hover:scale-105"
                            >
                                Logout
                            </button>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-6 py-8">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                            <div className="card-hover p-8 rounded-2xl border-l-4 border-blue-500 shadow-lg">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-gray-600 font-semibold text-sm">Active Requests</p>
                                        <p className="text-5xl font-bold text-blue-600 mt-2">{stats.active}</p>
                                    </div>
                                    <div className="text-6xl opacity-20">⚡</div>
                                </div>
                            </div>

                            <div className="card-hover p-8 rounded-2xl border-l-4 border-green-500 shadow-lg">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-gray-600 font-semibold text-sm">Completed Jobs</p>
                                        <p className="text-5xl font-bold text-green-600 mt-2">{stats.completed}</p>
                                    </div>
                                    <div className="text-6xl opacity-20">✅</div>
                                </div>
                            </div>
                        </div>

                        {!showCreateForm && (
                            <button
                                onClick={() => setShowCreateForm(true)}
                                className="btn-primary w-full text-white font-bold py-4 rounded-xl mb-8 text-lg transform transition hover:scale-102"
                            >
                                + Create New Breakdown Request
                            </button>
                        )}

                        {showCreateForm && (
                            <div className="glass p-8 rounded-2xl mb-8 shadow-xl fade-in">
                                <h3 className="text-2xl font-bold text-gray-800 mb-6">Report Vehicle Breakdown</h3>
                                <form onSubmit={handleCreateRequest} className="space-y-5">
                                    <div>
                                        <label className="block text-gray-700 font-semibold mb-2">Problem Type</label>
                                        <select
                                            value={formData.issue_description}
                                            onChange={e => setFormData({ ...formData, issue_description: e.target.value })}
                                            className="input-focus w-full px-4 py-3 border border-gray-300 rounded-lg"
                                            required
                                        >
                                            <option value="">Select a problem...</option>
                                            <option value="Flat Tire">🛞 Flat Tire</option>
                                            <option value="Engine Problem">🔧 Engine Problem</option>
                                            <option value="Dead Battery">🔋 Dead Battery</option>
                                            <option value="Starter Issue">⚙️ Starter Issue</option>
                                            <option value="Transmission">🚗 Transmission</option>
                                            <option value="Brake Failure">🛑 Brake Failure</option>
                                            <option value="Other">❓ Other</option>
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block text-gray-700 font-semibold mb-2">Your Location</label>
                                        <input
                                            type="text"
                                            placeholder="e.g., Near Central Station, Main Street"
                                            value={formData.location_text}
                                            onChange={e => setFormData({ ...formData, location_text: e.target.value })}
                                            className="input-focus w-full px-4 py-3 border border-gray-300 rounded-lg"
                                            required
                                        />
                                    </div>

                                    <div className="flex gap-3 pt-4">
                                        <button
                                            type="submit"
                                            disabled={submitting}
                                            className="btn-primary text-white font-bold px-8 py-3 rounded-lg flex-1 disabled:opacity-50 flex items-center justify-center gap-2"
                                        >
                                            {submitting ? (
                                                <>
                                                    <div className="spinner w-5 h-5 border-2 border-white border-t-transparent rounded-full"></div>
                                                    Submitting...
                                                </>
                                            ) : (
                                                "Submit Request 📍"
                                            )}
                                        </button>
                                        <button
                                            type="button"
                                            onClick={() => setShowCreateForm(false)}
                                            className="px-6 py-3 border-2 border-gray-300 rounded-lg font-semibold hover:bg-gray-100"
                                        >
                                            Cancel
                                        </button>
                                    </div>
                                </form>
                            </div>
                        )}

                        <div>
                            <h2 className="text-3xl font-bold text-gray-800 mb-6">Your Service Requests</h2>
                            
                            {loading ? (
                                <div className="text-center py-12">
                                    <div className="spinner w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full mx-auto"></div>
                                    <p className="text-gray-600 mt-4">Loading your requests...</p>
                                </div>
                            ) : requests.length === 0 ? (
                                <div className="glass p-12 rounded-2xl text-center">
                                    <div className="text-6xl mb-4">📭</div>
                                    <p className="text-gray-600 text-lg">No requests yet. Create one to get started!</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {requests.map((req, idx) => (
                                        <div
                                            key={req.id}
                                            className="card-hover p-6 rounded-2xl border-l-4 border-orange-500 shadow-lg fade-in"
                                            style={{ animationDelay: `${idx * 0.1}s` }}
                                        >
                                            <div className="flex justify-between items-start mb-4">
                                                <div>

            const [selectedRequest, setSelectedRequest] = useState(null);
            const [submitting, setSubmitting] = useState(false);
            const [statusUpdateData, setStatusUpdateData] = useState({ status: "in_progress", notes: "" });

            useEffect(() => { loadRequests(); }, []);

            const loadRequests = async () => {
                try {
                    setLoading(true);
                    const data = await fetchWithAuth("/provider/requests");
                    setRequests(Array.isArray(data) ? data : []);
                } catch (err) {
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            const handleAccept = async (requestId) => {
                if (!window.confirm("Accept this breakdown request?")) return;
                
                setSubmitting(true);
                try {
                    await fetchWithAuth(`/provider/accept/${requestId}`, { method: "POST" });
                    const data = await fetchWithAuth("/provider/requests");
                    setRequests(Array.isArray(data) ? data : []);
                    setSelectedRequest(null);
                } catch (err) {
                    alert("Failed to accept request");
                } finally {
                    setSubmitting(false);
                }
            };

            const handleStatusUpdate = async (requestId) => {
                if (!window.confirm(`Update status to ${statusUpdateData.status}?`)) return;
                
                setSubmitting(true);
                try {
                    await fetchWithAuth(`/provider/update-status/${requestId}`, {
                        method: "POST",
                        body: JSON.stringify(statusUpdateData)
                    });
                    const data = await fetchWithAuth("/provider/requests");
                    setRequests(Array.isArray(data) ? data : []);
                    setSelectedRequest(null);

                                            <thead className="bg-gray-100 border-b-2 border-gray-300">
                                                <tr>
                                                    <th className="text-left py-3 px-4 font-bold text-gray-700">Name</th>
                                                    <th className="text-left py-3 px-4 font-bold text-gray-700">Email</th>
                                                    <th className="text-left py-3 px-4 font-bold text-gray-700">Role</th>
                                                    <th className="text-left py-3 px-4 font-bold text-gray-700">Status</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {users.length === 0 ? (
                                                    <tr>
                                                        <td colSpan="4" className="py-8 text-center text-gray-600">
                                                            No users found
                                                        </td>
                                                    </tr>
                                                ) : (
                                                    users.map(u => (
                                                        <tr key={u.id} className="border-b hover:bg-gray-50 transition">
                                                            <td className="py-4 px-4 font-semibold text-gray-800">{u.name}</td>
                                                            <td className="py-4 px-4 text-gray-600">{u.email}</td>
                                                            <td className="py-4 px-4">
                                                                <span className={`px-3 py-1 rounded-full text-xs font-bold ${
                                                                    u.role === 'admin' ? 'bg-red-100 text-red-700' :
                                                                    u.role === 'provider' ? 'bg-green-100 text-green-700' :
                                                                    'bg-blue-100 text-blue-700'
                                                                }`}>
                                                                    {u.role?.toUpperCase()}
                                                                </span>
                                                            </td>
                                                            <td className="py-4 px-4">
                                                                <span className="px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700">
                                                                    Active
                                                                </span>
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'requests' && (
                            <div className="glass p-8 rounded-2xl shadow-lg">
                                <h2 className="text-2xl font-bold text-gray-800 mb-6">Service Requests</h2>
                                {loading ? (
                                    <div className="text-center py-8">
                                        <div className="spinner w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full mx-auto"></div>
                                    </div>
                                ) : (
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-sm">
                                            <thead className="bg-gray-100 border-b-2 border-gray-300">
                                                <tr>
                                                    <th className="text-left py-3 px-4 font-bold text-gray-700">ID</th>
                                                    <th className="text-left py-3 px-4 font-bold text-gray-700">Problem</th>
                                                    <th className="text-left py-3 px-4 font-bold text-gray-700">Location</th>
                                                    <th className="text-left py-3 px-4 font-bold text-gray-700">Status</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {requests.length === 0 ? (
                                                    <tr>
                                                        <td colSpan="4" className="py-8 text-center text-gray-600">
                                                            No requests found
                                                        </td>
                                                    </tr>
                                                ) : (
                                                    requests.map(r => (
                                                        <tr key={r.id} className="border-b hover:bg-gray-50 transition">
                                                            <td className="py-4 px-4 font-semibold text-gray-800">#{r.id}</td>
                                                            <td className="py-4 px-4 text-gray-600">{r.issue_description}</td>
                                                            <td className="py-4 px-4 text-gray-600">{r.location_text}</td>
                                                            <td className="py-4 px-4">
                                                                <span className={`badge-${r.status || 'pending'} px-3 py-1 rounded-full text-xs font-bold`}>
                                                                    {(r.status || 'pending').toUpperCase()}
                                                                </span>
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'analytics' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="glass p-8 rounded-2xl shadow-lg">
                                    <h3 className="text-xl font-bold text-gray-800 mb-6">User Distribution</h3>
                                    <div className="space-y-4">
                                        <div>
                                            <div className="flex justify-between mb-2">
                                                <span className="text-gray-700 font-semibold">Customers</span>
                                                <span className="text-blue-600 font-bold">{stats.totalCustomers}</span>
                                            </div>
                                            <div className="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                                                <div 
                                                    className="bg-blue-500 h-full" 
                                                    style={{ width: `${stats.totalUsers > 0 ? (stats.totalCustomers / stats.totalUsers) * 100 : 0}%` }}
                                                ></div>
                                            </div>
                                        </div>

                                        <div>
                                            <div className="flex justify-between mb-2">
                                                <span className="text-gray-700 font-semibold">Service Providers</span>
                                                <span className="text-green-600 font-bold">{stats.totalProviders}</span>
                                            </div>
                                            <div className="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                                                <div 
                                                    className="bg-green-500 h-full" 
                                                    style={{ width: `${stats.totalUsers > 0 ? (stats.totalProviders / stats.totalUsers) * 100 : 0}%` }}
                                                ></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="glass p-8 rounded-2xl shadow-lg">
                                    <h3 className="text-xl font-bold text-gray-800 mb-6">Request Status</h3>
                                    <div className="space-y-4">
                                        <div>
                                            <div className="flex justify-between mb-2">
                                                <span className="text-gray-700 font-semibold">Pending</span>
                                                <span className="text-orange-600 font-bold">{stats.pendingRequests}</span>
                                            </div>
                                            <div className="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                                                <div 
                                                    className="bg-orange-500 h-full" 
                                                    style={{ width: `${stats.totalRequests > 0 ? (stats.pendingRequests / stats.totalRequests) * 100 : 0}%` }}
                                                ></div>
                                            </div>
                                        </div>

                                        <div>
                                            <div className="flex justify-between mb-2">
                                                <span className="text-gray-700 font-semibold">Completed</span>
                                                <span className="text-green-600 font-bold">{stats.completedRequests}</span>
                                            </div>
                                            <div className="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                                                <div 
                                                    className="bg-green-500 h-full" 
                                                    style={{ width: `${stats.totalRequests > 0 ? (stats.completedRequests / stats.totalRequests) * 100 : 0}%` }}
                                                ></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ============ MAIN APP ROUTER ============
        function App() {
            const { user } = useAuth();

            if (!user) return <LoginSignupPage />;
            
            if (user.role === "admin") return <AdminDashboard />;
            if (user.role === "provider") return <ProviderDashboard />;
            if (user.role === "customer") return <CustomerDashboard />;
            
            return <LoginSignupPage />;
        }

        // ============ ROOT COMPONENT ============
        function Root() {
            const [showSplash, setShowSplash] = useState(() => {
                // Only show splash once - check if we've already shown it
                const hasSeenSplash = sessionStorage.getItem("hasSeenSplash");
                return !hasSeenSplash;
            });

            const handleSplashComplete = () => {
                sessionStorage.setItem("hasSeenSplash", "true");
                setShowSplash(false);
            };

            if (showSplash) {
                return <SplashScreen onComplete={handleSplashComplete} />;
            }

            return <App />;
        }

        // ============ RENDER ROOT ============
        ReactDOM.createRoot(document.getElementById("root")).render(
            <AuthProvider>
                <Root />
            </AuthProvider>
        );
    </script>
</body>
</html>
